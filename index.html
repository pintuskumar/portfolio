<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pintu Kumar — Full Stack Developer & Software Engineer</title>
    <meta name="description" content="Portfolio of Pintu Kumar — Full Stack Developer building scalable web applications with React, Node.js, TypeScript, and PostgreSQL. Based in Mumbai, India.">
    <meta name="author" content="Pintu Kumar" />

    <!-- Performance: preconnect / dns-prefetch -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="https://images.unsplash.com">

    <!-- Fonts: non-render-blocking, trimmed weights -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fira+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
    >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fira+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      media="print"
      onload="this.media='all'"
    >
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Fira+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap"
      >
    </noscript>

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Pintu Kumar — Full Stack Developer">
    <meta property="og:description" content="Full Stack Developer building scalable web apps with React, Node.js, and modern technologies. Based in Mumbai, India.">
    <meta property="og:image" content="/og-image.svg">

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Pintu Kumar — Full Stack Developer">
    <meta name="twitter:description" content="Full Stack Developer building scalable web apps with React, Node.js, and modern technologies. Based in Mumbai, India.">
    <meta name="twitter:image" content="/og-image.svg">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32">

    <!-- Prevent flash of wrong theme before React hydrates -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem("theme");
          if (theme === "light") {
            document.documentElement.classList.add("light");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
